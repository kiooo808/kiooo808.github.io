<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EnglishApp.v2-kio</title>

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #44474a;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent-color: #6d5dfc;
            --danger-color: #ff6b6b;
            --success-color: #2ecc71;
            --transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        *{
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            outline: none;
        }

        body{
            margin:0;
            padding:0;
            height:100vh;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:var(--bg-color);
            color:var(--text-color);
            transition:background .3s;
        }

        body.dark-mode{
            --bg-color:#2d3436;
            --text-color:#dfe6e9;
            --shadow-light:#3d4446;
            --shadow-dark:#1e2223;
            --accent-color:#a29bfe;
            --danger-color:#ff8e8e;
        }

        .app-container{
            flex:1;
            overflow-y:auto;
            padding:25px;
            padding-bottom:110px;
        }

        .page{
            display:none;
            opacity:0;
            transform:translateY(10px);
            transition:var(--transition);
        }

        .page.active{
            display:block;
            opacity:1;
            transform:translateY(0);
        }

        h1{
            text-align:center;
            font-size:1.1rem;
            margin-bottom:25px;
            font-weight:600;
        }

        .neu-flat{
            background:var(--bg-color);
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }

        .neu-pressed{
            background:var(--bg-color);
            box-shadow:
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
        }

        /* Search Styles */
        .search-area{
            position:relative;
            z-index:100;
            display:flex;
            gap:12px;
            padding-bottom:15px;
            background:var(--bg-color);
        }

        .search-box{
            flex:1;
            border:none;
            border-radius:25px;
            padding:14px 22px;
            font-size:14px;
        }

        .suggest-box {
            position: absolute;
            top: 55px;
            left: 0;
            right: 62px;
            border-radius: 15px;
            z-index: 101;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .suggest-item {
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .search-btn{
            width:50px;
            height:50px;
            border:none;
            border-radius:50%;
            cursor:pointer;
        }

        .lvl-btn{ 
          transition: var(--transition), transform 0.1s;
            flex:1;
            border:none;
            border-radius:12px;
            padding:12px 5px;
            font-size:13px;
            font-weight:600;
            color:var(--text-color);
            cursor:pointer;
        }

        .lvl-btn.active{
            color:var(--accent-color);
            box-shadow:
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
        }

        /* Stats Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .day-active {
            background: var(--success-color);
            color: white;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        .day-inactive {
            background: var(--shadow-dark);
            opacity: 0.3;
        }

        .stats-footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .stat-card {
            padding: 15px;
            border-radius: 18px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
        }

        /* Rest of Original Styles */
        .list-card{
            padding:20px;
            margin-bottom:25px;
            border-radius:20px;
            overflow:hidden;
        }

        .list-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            cursor:pointer;
            padding-bottom:10px;
        }

        .list-arrow{
            transition:transform .4s ease;
            font-size:12px;
            opacity:.7;
        }

        .list-card.collapsed .list-arrow{
            transform:rotate(-90deg);
        }

        .list-content-wrapper{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            padding-top:10px;
        }

        .list-card.collapsed .list-content-wrapper{
            display:none;
        }

        .word-item{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:6px;
            padding:8px 16px;
            border-radius:20px;
            font-size:13px;
            font-weight:500;
            background:var(--bg-color);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            cursor:pointer;
            transition:var(--transition);
        }

        .word-item:active{
            transform:scale(.95);
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
        }

        .review-badge{
            font-size:11px;
            opacity:.7;
        }

        #dictWrapper{
            display:none;
            margin-top:20px;
            overflow:hidden;
            border-radius:20px;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        }

        .dict-header{
            padding:12px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:var(--accent-color);
            color:#fff;
            font-size:13px;
        }

        .article-card{
            padding:20px;
            margin-bottom:15px;
            border-radius:20px;
            transition:var(--transition);
        }

        .article-body{
            max-height:0;
            overflow:hidden;
            transition:max-height .4s ease;
            margin-top:0;
            line-height:1.6;
            font-size:14px;
        }

        .article-card.open .article-body{
            max-height:1000px;
            margin-top:15px;
        }

        .nav-bar{
            position:fixed;
            left:0;
            right:0;
            bottom:0;
            height:75px;
            display:flex;
            justify-content:space-around;
            align-items:center;
            background:var(--bg-color);
            border-radius:25px 25px 0 0;
            box-shadow:0 -8px 15px var(--shadow-dark);
            z-index:1000;
        }

        .nav-item{
            padding:10px 8px;
            font-size:11px;
            font-weight:bold;
            color:#888;
            cursor:pointer;
            transition:var(--transition);
            text-align: center;
        }

        .nav-item.active{
            color:var(--accent-color);
            border-radius:12px;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        #toast{
            position:fixed;
            left:50%;
            bottom:100px;
            transform:translateX(-50%);
            padding:10px 20px;
            border-radius:20px;
            font-size:13px;
            opacity:0;
            pointer-events:none;
            z-index:3000;
            transition:.3s;
        }

        #toast.show{
            opacity:1;
        }

        #loginOverlay{
            position:fixed;
            inset:0;
            z-index:2000;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background:var(--bg-color);
        }

        .review-tabs{
            display:flex;
            gap:10px;
            padding:10px;
            border-radius:20px;
            margin-bottom:20px;
            flex-wrap:wrap;
        }
        
        .review-tab{
            flex:1;
            border:none;
            padding:12px 5px;
            border-radius:12px;
            background:var(--bg-color);
            color:var(--text-color);
            font-weight:600;
            font-size:13px;
            cursor:pointer;
            box-shadow:6px 6px 12px var(--shadow-dark),-6px -6px 12px var(--shadow-light);
            transition:var(--transition);
        }
        
        .review-tab.active{
            color:var(--accent-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }
        
        .review-panel{
            padding:22px;
            border-radius:24px;
            margin-bottom:20px;
        }
        .review-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:18px;
            font-weight:bold;
        }
        .review-list{
            display:flex;
            flex-direction:column;
            gap:15px;
        }
        .review-card{
            padding:20px;
            border-radius:20px;
        }
        .review-word{
            font-size:26px;
            font-weight:700;
            margin-bottom:10px;
            text-align: center;
        }
        .review-meaning{
            font-size:14px;
            opacity:.8;
            margin-bottom:15px;
        }
        .review-btn-group{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }
        .review-mode-switch{
            margin-bottom:15px;
            display:flex;
            justify-content:flex-end;
        }

        .lvl-btn:active {
            transform: scale(0.95);
            box-shadow: 
                inset 5px 5px 10px var(--shadow-dark), 
                inset -5px -5px 10px var(--shadow-light) !important;
            color: var(--accent-color);
        }

        .review-btn-group .lvl-btn:active {
            background-color: var(--bg-color);
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark), 
                inset -4px -4px 8px var(--shadow-light) !important;
        }

        .example-card{
            margin-top:12px;
            padding:14px;
            border-radius:16px;
            line-height:1.7;
            font-size:14px;
        }

        .example-en{
            font-weight:600;
        }

        .example-zh{
            opacity:.72;
            margin-top:6px;
        }

        .dict-frame{
            width:100%;
            height:450px;
            border:none;
            background:white;
            transition:.3s;
        }

        body.dark-mode .dict-frame{
            filter:
                brightness(var(--dict-brightness))
                contrast(1.08)
                saturate(.9);
        }

        .neu-slider{
            display:block;
            margin:0;
            width:100%;
            appearance:none;
            -webkit-appearance:none;
            height:18px;
            border-radius:18px;
            background:var(--bg-color);
            box-shadow:
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            outline:none;
        }

        .neu-slider::-webkit-slider-thumb{
            appearance:none;
            -webkit-appearance:none;
            width:32px;
            height:32px;
            border-radius:50%;
            background:var(--bg-color);
            cursor:pointer;
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transition:.2s;
        }

        .neu-slider::-webkit-slider-thumb:active{
            transform:scale(.92);
            box-shadow:
                inset 2px 2px 5px var(--shadow-dark),
                inset -2px -2px 5px var(--shadow-light);
        }

        .neu-slider::-moz-range-thumb{
            width:24px;
            height:24px;
            border:none;
            border-radius:50%;
            background:var(--bg-color);
            box-shadow:
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
        body:not(.dark-mode) #brightnessBox{
            display:none;
        }
        #folderChecklist::-webkit-scrollbar {
    width: 4px;
}
#folderChecklist::-webkit-scrollbar-thumb {
    background: var(--shadow-dark);
    border-radius: 10px;
}

    </style>
</head>

<body>

<div id="loginOverlay">
    <div class="neu-flat" style="padding:40px;text-align:center;width:280px;border-radius:30px;">
        <div class="neu-pressed" style="width:60px;height:60px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;">
            📖
        </div>
        <h2 style="font-size:1.2rem;margin-bottom:20px;">欢迎回来</h2>
        <input type="text" id="username" class="search-box neu-pressed" placeholder="输入用户名..." style="width:100%;margin-bottom:20px;">
        <button onclick="login()" class="lvl-btn neu-flat" style="width:100%;padding:15px;color:var(--accent-color);">进入系统</button>
    </div>
</div>

<div id="toast" class="neu-flat">提示</div>

<div id="wordDetail"
     style="
        position:fixed;
        inset:0;
        z-index:5000;
        background:rgba(0,0,0,.35);
        display:none;
        align-items:center;
        justify-content:center;
        padding:25px;
     ">

    <div class="neu-flat"
         style="
            width:100%;
            max-width:500px;
            max-height:80vh;
            overflow-y:auto;
            border-radius:28px;
            padding:25px;
         ">

        <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        ">

            <div id="detailWord"
                 style="
                    font-size:28px;
                    font-weight:700;
                    color:var(--accent-color);
                 ">
            </div>

            <button onclick="closeWordDetail()"
                    class="lvl-btn neu-flat"
                    style="
                        width:45px;
                        height:45px;
                        border-radius:50%;
                        flex:none;
                    ">
                ✕
            </button>

        </div>

        <div id="detailMeaning"
             style="
                line-height:1.7;
                margin-bottom:20px;
             ">
        </div>

        <div id="detailExamples"></div>

    </div>

</div>

<div class="app-container">
    <div id="page1" class="page active">
        <h1>快速查询</h1>
        <div class="search-area">
            <input type="text" id="searchInput" class="search-box neu-pressed" placeholder="输入单词..." oninput="handleInput(this)" onkeydown="if(event.key==='Enter') doSearch()">
            <div id="searchSuggest" class="suggest-box neu-flat"></div>
            <button onclick="doSearch()" class="search-btn neu-flat">🔍</button>
        </div>
        <div id="dictWrapper">
            <div class="dict-header">
                <span>在线释义 (有道)</span>
                <span onclick="closeDict()" style="cursor:pointer;">✕ 关闭</span>
            </div>
            <iframe id="dictFrame" class="dict-frame" src="" style="width:100%;height:450px;border:none;background:white;"></iframe>
        </div>
        <div id="localRes" class="neu-flat" style="padding:25px;margin-top:10px;border-radius:20px;">
            <h2 id="resWord" style="margin:0;color:var(--accent-color);">Ready</h2>
            <p id="resMeaning" style="margin-top:12px;font-size:14px;">等待查询...</p>
        </div>
        <div id="brightnessBox" class="neu-flat" style="width:100%;margin-top:12px;padding:16px;border-radius:18px;">
            <div style="margin-bottom:12px;font-size:13px;font-weight:600;opacity:.75;text-align:center;">词典夜间亮度</div>
            <input type="range" min="0.35" max="1" step="0.01" value="0.78" id="brightnessSlider" class="neu-slider" oninput="changeDictBrightness(this.value)">
        </div>
        <button onclick="saveMeaning()" class="lvl-btn neu-flat" style="width:100%;margin-top:12px;padding:16px;border-radius:18px;color:var(--success-color);font-weight:bold;">保存本地释义</button>
        <button onclick="quickSaveMeaning()" class="lvl-btn neu-flat" style="width:100%;margin-top:12px;padding:16px;border-radius:18px;color:#4b8bf5;font-weight:bold;">快速保存剪贴板释义</button>
        <button id="exampleBtn" onclick="addExample()" class="lvl-btn neu-flat" style="width:100%;margin-top:15px;padding:16px;border-radius:18px;color:var(--accent-color);font-weight:bold;">请先查询单词</button>
    </div>

    <div id="page2" class="page">
        <h1>我的词库</h1>
        <div class="list-card neu-flat" id="todayCard">
            <div class="list-header" onclick="toggleList('todayCard')">
                <p style="font-size:12px;margin:0;font-weight:bold;">今日新增 (<span id="todayCount">0</span>)</p>
                <span class="list-arrow">▼</span>
            </div>
            <div class="list-content-wrapper" id="todayList"></div>
        </div>
        <div class="list-card neu-flat" id="allCard">
            <div class="list-header" onclick="toggleList('allCard')">
                <p style="font-size:12px;margin:0;font-weight:bold;">所有记录 (<span id="allCount">0</span>)</p>
                <span class="list-arrow">▼</span>
            </div>
            <div class="list-content-wrapper" id="allList"></div>
        </div>
        <div class="list-card neu-flat" id="favoriteCard">
    <div class="list-header" onclick="toggleList('favoriteCard')">
        <p style="font-size:12px;margin:0;font-weight:bold;color:var(--accent-color);">
            收藏夹管理 (<span id="folderCount">0</span>)
        </p>
        <span class="list-arrow">▼</span>
    </div>
    <div class="list-content-wrapper" style="flex-direction: column; gap: 15px; width: 100%;">
        <button class="lvl-btn neu-flat" style="width:100%; color:var(--accent-color);" onclick="createNewFolder()">+ 新建文件夹</button>
        <div id="folderContainer" style="width:100%; display: flex; flex-direction: column; gap: 12px;"></div>
    </div>
</div>

    </div>

    <div id="page3" class="page">
        <h1>复习调度</h1>
        <div class="review-tabs neu-flat">
            <button class="review-tab active" onclick="switchReviewTab('new',this)">今日新学</button>
            <button class="review-tab" onclick="switchReviewTab('review',this)">正在复习</button>
            <button class="review-tab" onclick="switchReviewTab('done',this)">复习完成</button>
            <button class="review-tab" onclick="switchReviewTab('hard',this)">生词本</button>
        </div>
        <div id="reviewContainer"></div>
    </div>

    <div id="page6" class="page">
        <h1>学习统计</h1>
        <div id="calendarContainer" class="calendar-grid neu-flat"></div>
        <div class="stats-footer-grid">
            <div class="stat-card neu-flat">
                <span class="stat-val" id="statToday">0</span>
                <span class="stat-label">今日单词</span>
            </div>
            <div class="stat-card neu-flat">
                <span class="stat-val" id="statTotalStudy">0</span>
                <span class="stat-label">累计学习天数</span>
            </div>
            <div class="stat-card neu-flat">
                <span class="stat-val" id="statTotalReview">0</span>
                <span class="stat-label">累计复习天数</span>
            </div>
            <div class="stat-card neu-flat">
                <span class="stat-val" id="statStreak">0</span>
                <span class="stat-label">连续学习天数</span>
            </div>
        </div>
    </div>

    <div id="page4" class="page">
        <h1>文章生成</h1>
        <div class="neu-flat" style="padding:25px;margin-bottom:35px;border-radius:20px;">
    <p style="font-size:13px;margin-bottom:20px;font-weight:bold;text-align:center;">选择单词来源 (多选)</p>
    <div style="display:flex;gap:10px;margin-bottom:25px;" id="sourceGroup">
        <button class="lvl-btn neu-flat active" onclick="toggleSource('today', this)">今日单词</button>
        <button class="lvl-btn neu-flat" onclick="toggleSource('hard', this)">生词本</button>
        <button class="lvl-btn neu-flat" onclick="toggleSource('fav', this)">收藏夹</button>
    </div>
    <div id="folderSelectorPanel" class="neu-pressed" style="display:none; padding:15px; border-radius:15px; margin-bottom:20px;">
        <p style="font-size:11px; opacity:0.6; margin-bottom:10px;">选择具体的文件夹：</p>
        <div id="folderChipsContainer" style="display:flex; flex-wrap:wrap; gap:8px;">
            </div>
    </div>
        <div class="neu-flat" style="padding:25px;margin-bottom:35px;border-radius:20px;">
            <p style="font-size:13px;margin-bottom:20px;font-weight:bold;text-align:center;">选择生成水平</p>
            <div style="display:flex;gap:12px;margin-bottom:25px;" id="lvlGroup">
                <button class="lvl-btn neu-flat active" onclick="setLvl('四级', this)">四级</button>
                <button class="lvl-btn neu-flat" onclick="setLvl('六级', this)">六级</button>
                <button class="lvl-btn neu-flat" onclick="setLvl('考研', this)">考研</button>
                <button class="lvl-btn neu-flat" onclick="setLvl('雅思', this)">雅思</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <button class="lvl-btn neu-flat" style="width:100%;color:var(--accent-color);font-weight:bold;padding:16px;border-radius:15px;" onclick="copyPrompt()">复制 AI 提示词</button>
                <button class="lvl-btn neu-flat" style="width:100%;color:#4b8bf5;font-weight:bold;padding:16px;border-radius:15px;" onclick="jumpToGPT()">
                  跳转 ChatGPT 生成</button>
            </div>
        </div>
        <button class="lvl-btn neu-flat" style="width:100%;padding:16px;border-radius:15px;color:var(--success-color);font-weight:bold;margin-bottom:15px;" onclick="importArticle()">导入 AI 生成文本</button>
        
        <div class="search-area" style="padding-bottom:0;">
            <input type="text" id="articleSearchInput" class="search-box neu-pressed" placeholder="输入单词查找相关文章..." oninput="renderArticles()">
        </div>
    </div>

    <div id="articleContainer"></div>
</div>

    <div id="page5" class="page">
        <h1>个人中心</h1>
        <div class="neu-flat" style="padding:30px 20px;margin-bottom:30px;display:flex;flex-direction:column;align-items:center;border-radius:20px;">

<script>
// --- IndexedDB Wrapper Logic ---
const DB_NAME = 'EnglishLearnerDB';
const STORE_NAME = 'keyval';
let dbInstance = null;
let selectedFolderIndexes = []; // 存储选中的文件夹索引

function initDB() {
    return new Promise((resolve, reject) => {
        if (dbInstance) return resolve(dbInstance);
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = e => reject(e);
        request.onsuccess = e => {
            dbInstance = e.target.result;
            resolve(dbInstance);
        };
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'key' });
            }
        };
    });
}

async function dbGet(key) {
    const db = await initDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
    });
}

async function dbSet(key, value) {
    const db = await initDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.put({ key, value });
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

// --- App State ---
let dictDarkness = localStorage.getItem('dict_darkness') || 0.78;
let dictionary = {};
let currentUser = "";
let currentWord = "";
let stats = {
    today: [],
    all: [],
    articles: [],
    level: "四级",
    lastDate: "",
    history: {},
    reviewHistory: []
};

function getTodayStr(){
    return new Date().toLocaleDateString();
}

window.addEventListener('DOMContentLoaded', () => {
    applyDictBrightness();
    const savedTheme = localStorage.getItem('theme');
    if(savedTheme === 'dark'){
        document.body.classList.add('dark-mode');
        document.getElementById('themeBtn').innerHTML = "☀️ 切换浅色模式";
    }
    const slider = document.getElementById('brightnessSlider');
    if(slider){ slider.value = dictDarkness; }
});

function toggleTheme(){
    const isDark = document.body.classList.toggle('dark-mode');
    document.getElementById('themeBtn').innerHTML = isDark ? "☀️ 切换浅色模式" : "🌙 切换深色模式";
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

async function login(){
    const nameInput = document.getElementById('username');
    const name = nameInput.value.trim();
    if(!name) return showToast("请输入用户名");

    currentUser = name;
    document.getElementById('displayName').innerText = name;

    // 读取 IndexedDB 数据
    let saved = await dbGet('user_data_' + name);
    let savedDict = await dbGet('dictionary_' + name);
    // 在 login 函数内部 stats 初始化逻辑处添加
if (!stats.folders) {
    // 兼容老用户：将原有 favorites 数组迁移到“默认收藏”文件夹
    stats.folders = [
        { name: "默认收藏", words: stats.favorites || [], date: Date.now() }
    ];
}
     // 在 login 函数内部，stats 数据升级兼容部分添加：
if (!stats.favorites) stats.favorites = []; 
// 在 login 函数内部 stats 初始化逻辑处
if (!stats.reviewHistoryMap) stats.reviewHistoryMap = {}; 

    // 从 localStorage 迁移历史数据的逻辑
    if (!saved && localStorage.getItem('user_data_' + name)) {
        saved = JSON.parse(localStorage.getItem('user_data_' + name));
        await dbSet('user_data_' + name, saved);
    }
    if (!savedDict && localStorage.getItem('dictionary_' + name)) {
        savedDict = JSON.parse(localStorage.getItem('dictionary_' + name));
        await dbSet('dictionary_' + name, savedDict);
    }

    dictionary = savedDict || {};

    if(saved){
        stats = saved;
        if(!stats.history) stats.history = {};
        if(!stats.reviewHistory) stats.reviewHistory = [];
        if(stats.lastDate !== getTodayStr()){
            stats.today = [];
            stats.lastDate = getTodayStr();
        }
    }else{
        stats.lastDate = getTodayStr();
        stats.history = {};
        stats.reviewHistory = [];
    }
    
    // 数据升级兼容
    if(stats.all && stats.all.length > 0 && typeof stats.all[0] === 'string'){
        stats.all = stats.all.map(word => ({word, date: getTodayStr(), review: 0, stage: 0}));
        stats.today = stats.today.map(word => ({word, date: getTodayStr(), review: 0, stage: 0}));
    }

    updateLists();
    renderArticles();
    renderReview();
    renderStats();
    saveData();
    document.getElementById('loginOverlay').style.display = 'none';
}

function showPage(num, el){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page' + num).classList.add('active');
    if(el) el.classList.add('active');
    if(num === 3) renderReview();
    if(num === 6) renderStats();
}

function handleInput(input) {
    const val = input.value.toLowerCase().trim();
    const suggestBox = document.getElementById('searchSuggest');
    if (val.length < 2) {
        suggestBox.style.display = 'none';
        return;
    }
    const matches = stats.all
        .filter(item => item.word.startsWith(val))
        .slice(0, 5);
    
    if (matches.length > 0) {
        suggestBox.innerHTML = matches.map(m => `
            <div class="suggest-item" onclick="fillSearch('${m.word}')">${m.word}</div>
        `).join('');
        suggestBox.style.display = 'block';
    } else {
        suggestBox.style.display = 'none';
    }
}

function fillSearch(word) {
    document.getElementById('searchInput').value = word;
    document.getElementById('searchSuggest').style.display = 'none';
    doSearch();
}

function doSearch(){
    const input = document.getElementById('searchInput');
    const word = input.value.toLowerCase().trim();
    currentWord = word;
    updateExampleBtn();
    if(!word) return;
    document.getElementById('searchSuggest').style.display = 'none';

    const exists = stats.all.some(i => i.word === word);
    if(!exists){
        const item = { word, date: getTodayStr(), review: 0, stage: 0 };
        stats.all.push(item);
        stats.today.push(item);
        
        const today = getTodayStr();
        stats.history[today] = (stats.history[today] || 0) + 1;
        
        updateLists();
        saveData();
    }

    const wrapper = document.getElementById('dictWrapper');
    const frame = document.getElementById('dictFrame');
    const localRes = document.getElementById('localRes');

    wrapper.style.display = 'block';
    localRes.style.display = 'block';
    frame.src = `https://m.youdao.com/dict?le=eng&q=${encodeURIComponent(word)}`;
    renderLocalWord(word);
    input.value = '';
}

function renderStats() {
    const container = document.getElementById('calendarContainer');
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    let html = '';
    ['日','一','二','三','四','五','六'].forEach(d => {
        html += `<div style="text-align:center;font-size:10px;opacity:0.5;">${d}</div>`;
    });
    
    for(let i=0; i<firstDay; i++) html += '<div></div>';
    
    for(let d=1; d<=daysInMonth; d++) {
        const dateStr = new Date(year, month, d).toLocaleDateString();
        
        // 获取学习和复习数据
        const studyCount = (stats.history && stats.history[dateStr]) || 0;
        const reviewCount = (stats.reviewHistoryMap && stats.reviewHistoryMap[dateStr]) || 0;
        
        // 只要有学习或复习，就显示激活状态
        const hasActivity = studyCount > 0 || reviewCount > 0;
        const activeClass = hasActivity ? 'day-active' : 'day-inactive';
        
        // 修改点击后的提示内容
        const clickAction = `showToast('📅 ${dateStr}\\n新增学习: ${studyCount} 词\\n巩固复习: ${reviewCount} 次')`;
        
        html += `<div class="calendar-day ${activeClass}" onclick="${clickAction}">${d}</div>`;
    }
    container.innerHTML = html;

    // 更新底部指标卡片
    document.getElementById('statToday').innerText = stats.today.length;
    document.getElementById('statTotalStudy').innerText = Object.keys(stats.history || {}).length;
    document.getElementById('statTotalReview').innerText = new Set(stats.reviewHistory || []).size;
    
    // 连续达标天数逻辑保持不变
    let streak = 0;
    let checkDate = new Date();
    while(true) {
        const dStr = checkDate.toLocaleDateString();
        if((stats.history && stats.history[dStr]) || (stats.reviewHistoryMap && stats.reviewHistoryMap[dStr])) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
        } else {
            break;
        }
    }
    document.getElementById('statStreak').innerText = streak;
}

let currentReviewTab = 'new';
let reviewCardMode = false;
let currentCardIndex = 0;

function getStageLabel(stage) {
    if (stage <= 0) return '新学/待复习';
    
    // 假设 INTERVAL_CONFIG 是你定义的间隔时间数组
    const MAX_STAGE = 7; 
    
    if (stage > MAX_STAGE) {
        return '最终掌握';
    }
    
    return `第 ${stage} 轮复习`;
}

function ensureReviewData(){
    stats.all.forEach(item=>{
        if(item.stage === undefined) item.stage = 0;
        if(!item.reviewQueue) item.reviewQueue = false;
        if(!item.hardWord) item.hardWord = false;
    });
}

function switchReviewTab(tab,el){
    currentReviewTab = tab;
    document.querySelectorAll('.review-tab').forEach(btn=>btn.classList.remove('active'));
    if(el) el.classList.add('active');
    renderReview();
}

function getReviewWords(){
    ensureReviewData();
    const now = new Date();
    now.setHours(23, 59, 59, 999);
    const nowTime = now.getTime();
    return stats.all.filter(i => {
        if(i.stage >= 5 && !i.reviewQueue) return false;
        if(i.reviewQueue) return true;
        if(!i.nextReviewTime || i.nextReviewTime <= nowTime) return true;
        return false;
    });
}

function setNextReview(item, nextStage, isForgot = false) {
    // 确保与 STAGE_MAP 一致：1, 3, 7, 15, 30, 90, 180
    const INTERVALS = [1, 3, 7, 15, 30, 90, 180];
    
    item.stage = nextStage;
    const nextDate = new Date();
    nextDate.setHours(0, 0, 0, 0); 

    if (isForgot) {
        // 惩罚机制：无论处于哪个阶段，明天必须先见一面
        nextDate.setDate(nextDate.getDate() + 1);
    } else {
        // 补偿跳级机制：根据当前减半/衰减后的阶段，决定下次复习时间
        if (nextStage > INTERVALS.length) {
            // 最终掌握：一年后再复习
            nextDate.setFullYear(nextDate.getFullYear() + 1);
        } else {
            // 正常间隔：注意 nextStage 从 1 开始，索引要减 1
            const delay = INTERVALS[nextStage - 1] || 1;
            nextDate.setDate(nextDate.getDate() + delay);
        }
    }

    item.nextReviewTime = nextDate.getTime();
    saveData();
}

function logReviewActivity() {
    const todayStr = getTodayStr();
    // 记录去重的复习天数（用于原有统计）
    if(!stats.reviewHistory.includes(todayStr)) {
        stats.reviewHistory.push(todayStr);
    }
    
    // 新增：记录每日详细复习次数
    if (!stats.reviewHistoryMap) stats.reviewHistoryMap = {};
    stats.reviewHistoryMap[todayStr] = (stats.reviewHistoryMap[todayStr] || 0) + 1;
    
    saveData();
}

function advanceReview(word){
    logReviewActivity();
    const item = stats.all.find(i=>i.word===word);
    if(!item) return;
    let currentStage = item.stage || 0;
    setNextReview(item, currentStage + 1);
    item.reviewQueue = false;
    if(reviewCardMode){
        const nextWords = getReviewWords();
        if (currentCardIndex >= nextWords.length) currentCardIndex = 0;
    }
    saveData();
    renderReview();
}

function downgradeReview(word){
    logReviewActivity();
    const item = stats.all.find(i=>i.word===word);
    if(!item) return;
    let currentStage = item.stage || 1;
    let newStage = Math.max(currentStage - 1, 0);
    setNextReview(item, newStage);
    item.reviewQueue = false;
    saveData();
    renderReview();
}

function resetReview(word) {
    logReviewActivity();
    const index = stats.all.findIndex(i => i.word === word);
    if (index === -1) return;
    const item = stats.all[index];
    item.stage = 0;
    item.reviewQueue = true;
    item.nextReviewTime = 0;
    if (reviewCardMode) {
        const words = getReviewWords();
        if (words.length > 1 && words[currentCardIndex].word === word) {
            currentCardIndex = (currentCardIndex + 1) % words.length;
        }
    }
    saveData();
    renderReview();
    showToast("已放入稍后重试");
}

function renderReview() {
    ensureReviewData();
    const container = document.getElementById('reviewContainer');
    const todayWords = stats.today || [];
    const reviewWords = getReviewWords();

    if (reviewCardMode && reviewWords.length > 0) {
        if (currentCardIndex >= reviewWords.length) currentCardIndex = 0;
    }
    
    const hardWords = stats.all.filter(i => i.hardWord);

    // 1. 今日学习新词标签页
    if (currentReviewTab === 'new') {
        container.innerHTML = `
            <div class="review-panel neu-flat">
                <div class="review-top"><span>今日学习单词</span><span>${todayWords.length} 个</span></div>
                <div class="review-list">
                    ${todayWords.map(item => `
                        <div class="review-card neu-flat">
                            <div class="review-word">${item.word}</div>
                            <div>${getStageLabel(item.stage || 0)}</div>
                        </div>
                    `).join('') || '<div>今日暂无新词</div>'}
                </div>
            </div>`;
        return;
    }

    // 2. 今日复习标签页 (核心修改点)
    if (currentReviewTab === 'review') {
        if (reviewWords.length === 0) {
            container.innerHTML = `<div class="review-panel neu-flat">今日复习已经完成</div>`;
            return;
        }

        // 按钮渲染逻辑
        const renderBtns = (item) => {
            const word = item.word;
            // 首次复习单词 (Stage 0)
            if ((item.stage || 0) === 0) {
                return `
                    <button class="lvl-btn neu-flat" onclick="handleReviewAction('${word}', 'first_know')">已掌握</button>
                    <button class="lvl-btn neu-flat" onclick="handleReviewAction('${word}', 'first_fail')">不熟悉</button>`;
            }
            // 非首次复习单词 (Stage > 0)
            return `
                <button class="lvl-btn neu-flat" onclick="handleReviewAction('${word}', 'know')">认识</button>
                <button class="lvl-btn neu-flat" onclick="handleReviewAction('${word}', 'vague')">模糊</button>
                <button class="lvl-btn neu-flat" onclick="handleReviewAction('${word}', 'forget')">不认识</button>`;
        };

        // 单词卡片内容模板
        const wordContent = (item) => `
            <div class="review-word">${item.word}</div>
            <div class="review-meaning">${getStageLabel(item.stage || 0)}</div>
            <div class="review-btn-group">
                ${renderBtns(item)}
                <button class="lvl-btn neu-flat" onclick="toggleHardWord('${item.word}')">
                    ${item.hardWord ? '移出核心' : '加入生词本'}
                </button>
                <button class="lvl-btn neu-flat" onclick="openWordDetail('${item.word}')">查看释义</button>
            </div>
        `;

        container.innerHTML = `
            <div class="review-panel neu-flat">
                <div class="review-top">
                    <span>今日复习单词</span>
                    <span>${reviewWords.length} 个</span>
                </div>
                <div class="review-mode-switch">
                    <button class="lvl-btn neu-flat" onclick="toggleReviewMode()">
                        ${reviewCardMode ? '切换列表模式' : '切换卡片模式'}
                    </button>
                </div>
                ${reviewCardMode ? 
                    `<div class="review-card neu-flat">${wordContent(reviewWords[currentCardIndex])}</div>` : 
                    `<div class="review-list">${reviewWords.map(item => `<div class="review-card neu-flat">${wordContent(item)}</div>`).join('')}</div>`
                }
            </div>`;
        return;
    }

    // 3. 统计展示标签页
    if (currentReviewTab === 'done') {
        const STAGE_MAP = [
            { stage: 1, label: "1天后" }, { stage: 2, label: "3天后" },
            { stage: 3, label: "7天后" }, { stage: 4, label: "15天后" },
            { stage: 5, label: "30天后" }, { stage: 6, label: "90天后" },
            { stage: 7, label: "180天后" }
        ];
        const getCount = n => stats.all.filter(i => i.stage === n).length;
        const masteredCount = stats.all.filter(i => i.stage > STAGE_MAP.length).length;

        const stageHtml = STAGE_MAP.map(item => `
            <div class="review-card neu-flat" style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:13px;">第 ${item.stage} 阶段 (${item.label})</span>
                <span style="font-weight:bold; color:var(--accent-color)">${getCount(item.stage)}</span>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="review-panel neu-flat">
                <div class="review-top"><span>全库记忆分布</span><span style="font-size:12px; opacity:0.7;">总计: ${stats.all.length} 词</span></div>
                <div class="review-list">
                    ${stageHtml}
                    <div class="review-card neu-flat" style="display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--success-color);">
                        <span style="font-weight:bold; color:var(--success-color);">最终掌握</span>
                        <span style="font-weight:bold; color:var(--success-color)">${masteredCount}</span>
                    </div>
                </div>
            </div>`;
        return;
    }

    // 4. 生词本标签页
    container.innerHTML = `
        <div class="review-panel neu-flat">
            <div class="review-top"><span>生词本</span><span>${hardWords.length} 个</span></div>
            <div class="review-list">
                ${hardWords.map(item => `
                    <div class="review-card neu-flat">
                        <div class="review-word">${item.word}</div>
                        <div class="review-btn-group">
                            <button class="lvl-btn neu-flat" onclick="toggleHardWord('${item.word}')">移出</button>
                            <button class="lvl-btn neu-flat" onclick="openWordDetail('${item.word}')">查看释义</button>
                        </div>
                    </div>
                `).join('') || '暂无生词'}
            </div>
        </div>`;
}


function toggleReviewMode(){ reviewCardMode = !reviewCardMode; currentCardIndex = 0; renderReview(); }
function toggleHardWord(word) {
    const item = stats.all.find(i => i.word === word);
    if (!item) return;

    item.hardWord = !item.hardWord;
    saveData();
    
    // 增加浮窗反馈逻辑
    if (item.hardWord) {
        showToast(`已加入生词本: ${word}`);
    } else {
        showToast(`已从生词本移除: ${word}`);
    }

    renderReview();
}

function jumpToSearch(word){ showPage(1); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelectorAll('.nav-item')[0].classList.add('active'); document.getElementById('searchInput').value = word; doSearch(); }
function closeDict(){ document.getElementById('dictWrapper').style.display = 'none'; }
function toggleList(id){ document.getElementById(id).classList.toggle('collapsed'); }
function logout(){ location.reload(); }

function saveData(){
    if(currentUser){ dbSet('user_data_' + currentUser, stats).catch(console.error); }
}

function saveDictionary(){
    if(currentUser){ dbSet('dictionary_' + currentUser, dictionary).catch(console.error); }
}

function showToast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg;

function handleFile(input, type) {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const json = JSON.parse(e.target.result);
            
            if (type === 'dict') {
                // 传统的纯词典导入逻辑保持兼容
                processSimpleDict(json);
            } else {
                // 处理全量或词书备份导入
                stats = json;
                
                // 如果备份文件中包含本地字典，则恢复它
                if (json.localDictionary) {
                    dictionary = json.localDictionary;
                    saveDictionary();
                }
                
                // 刷新 UI
                updateLists();
                renderArticles();
                renderReview();
                renderStats();
                saveData();
                showToast("数据已完全恢复");
            }
        } catch (err) { 
            console.error(err);
            showToast("解析失败，请检查文件格式"); 
        }
    };
    reader.readAsText(input.files[0]);
}

// 提取出的纯词典处理逻辑
function processSimpleDict(json) {
    dictionary = {};
    if (Array.isArray(json)) {
        json.forEach(i => {
            const k = i.word || i.key || Object.values(i)[0];
            const v = i.trans || i.definition || Object.values(i)[1];
            if (k) dictionary[k.toLowerCase()] = { meaning: v, examples: [] };
        });
    } else {
        Object.keys(json).forEach(k => {
            dictionary[k.toLowerCase()] = typeof json[k] === 'object' ? json[k] : { meaning: json[k], examples: [] };
        });
    }
    saveDictionary();
    showToast(`已载入: ${Object.keys(dictionary).length} 词`);
}

function renderArticles() {

// 辅助函数：在搜索结果中高亮单词
function highlightKeyword(text, keyword) {
    if (!keyword) return text;
    const reg = new RegExp(`(${keyword})`, 'gi');
    return text.replace(reg, `<span style="color:var(--accent-color); font-weight:bold; text-decoration:underline;">$1</span>`);
}


function exportData() {
    if (!currentUser) return showToast("请先登录");

    // 1. 准备数据源
    const fullData = {
        ...stats,
        localDictionary: dictionary 
    };

    const dictOnlyData = {
        ...stats,
        localDictionary: dictionary
    };
    delete dictOnlyData.articles; // 移除 AI 文章逻辑

    // 2. 使用 prompt 模拟一个简易的三选一菜单，防止误触
    const msg = `请选择导出类型（输入数字）：\n\n1. 全量备份 (含AI文章、统计、释义)\n2. 纯词书导出 (仅含单词、释义、例句)\n\n输入其他任何内容或点击取消将终止导出。`;
    const choice = prompt(msg);

    // 3. 逻辑分支处理
    let dataToExport = null;
    let fileName = "";

    if (choice === "1") {
        dataToExport = fullData;
        fileName = `${currentUser}_全量备份_${getTodayStr().replace(/\//g, '-')}.json`;
    } else if (choice === "2") {
        dataToExport = dictOnlyData;
        fileName = `${currentUser}_纯词书_${getTodayStr().replace(/\//g, '-')}.json`;
    } else {
        // 涵盖了误触取消或输入错误的情况
        showToast("操作已取消");
        return;
    }

    // 4. 执行下载
    try {
        const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        
        // 释放内存
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast("导出成功");
    } catch (err) {
        showToast("导出失败，请重试");
    }
}

function ensureWordObject(word){
    if(typeof dictionary[word] === 'string'){
        dictionary[word] = { meaning: dictionary[word], examples:[] };
    }
    if(!dictionary[word]){
        dictionary[word] = { meaning:'', examples:[] };
    }
    if(!dictionary[word].examples){
        dictionary[word].examples = [];
    }
}

function parseExample(text){
    const lines = text.split('\n').map(i => i.trim()).filter(Boolean);
    if(lines.length < 2) return null;
    return { en: lines[0], zh: lines[1] };
}

function addExample(){
    if(!currentWord){ return showToast("请先查询单词"); }
    const content = prompt(`为「${currentWord}」粘贴例句：\n\n格式：\n\nHe abandoned the project.\n他放弃了这个项目。`);
    if(!content) return;
    const parsed = parseExample(content);
    if(!parsed){ return showToast("格式错误，需要英文+中文两行"); }
    ensureWordObject(currentWord);
    dictionary[currentWord].examples.push(parsed);
    saveDictionary();

}

function handleReviewAction(word, type) {
    const item = stats.all.find(i => i.word === word);
    if (!item) return;

    let nextStage = item.stage;
    let isForgot = false;

    // --- 新增：处理首次复习单词 (Stage 0) ---
    if (type === 'first_know') {
        nextStage = 1; // 首次掌握，进入第一阶段（1天后）
        isForgot = false;
        showToast("新词学习成功");
    } 
    else if (type === 'first_fail') {
        // 逻辑：不改变 stage，但在内存中将其移动到复习列表末尾
        const reviewWords = getReviewWords();
        const idx = reviewWords.findIndex(i => i.word === word);
        if (idx > -1) {
            const [target] = reviewWords.splice(idx, 1);
            reviewWords.push(target); 
            // 如果是卡片模式，索引不变（相当于看下一张），如果是列表模式，它会出现在底部
        }
        renderReview(); 
        return; // 跳过后面的 saveData 和 setNextReview
    }
    // --- 原有：处理非首次复习单词 (Stage > 0) ---
    else if (type === 'know') {
        nextStage = item.stage + 1;
        isForgot = false;
        showToast("巩固成功");
    } else if (type === 'vague') {
        nextStage = Math.max(1, Math.floor(item.stage * 0.7));
        isForgot = true;
        showToast("已设为模糊，明天加强复习");
    } else if (type === 'forget') {
        nextStage = Math.max(1, Math.floor(item.stage * 0.5));
        isForgot = true;
        showToast("已重置进度，明天重新学习");
    }

    // 更新时间与阶段
    setNextReview(item, nextStage, isForgot);
    logReviewActivity();
    
    // 如果是卡片模式，自动切到下一个
    if (reviewCardMode) {
        currentCardIndex++;
    }
    
    renderReview();
}

let selectedSources = { today: true, hard: false, fav: false };

function toggleSource(type, el) {

        el.classList.add('active');
    } else {

    }

            renderFolderChips();
        } else {
            panel.style.display = 'none';
        }
    }

        selectedSources.today = true;
        document.querySelector("#sourceGroup button").classList.add('active');

function getSelectedWords() {
    let combined = [];
    
    // 1. 抓取今日单词
    if (selectedSources.today) {
        combined = combined.concat(stats.today.map(i => i.word));
    }
    
    // 2. 抓取生词本
    if (selectedSources.hard) {
        combined = combined.concat(stats.all.filter(i => i.hardWord).map(i => i.word));
    }
    
    // 3. 抓取选中的文件夹
    if (selectedSources.fav) {
        // 如果用户启用了收藏夹但没勾选具体文件夹，默认抓取“默认收藏”
        if (selectedFolderIndexes.length === 0) {
            const defaultFolder = stats.folders.find(f => f.name === "默认收藏");
            if (defaultFolder) combined = combined.concat(defaultFolder.words);
        } else {
            selectedFolderIndexes.forEach(idx => {
                if (stats.folders[idx]) {
                    combined = combined.concat(stats.folders[idx].words);
                }
            });
        }
    }
    
    // 去重并过滤空值
    return [...new Set(combined)].filter(w => w && w.trim() !== "");
}

function deleteFolder(index) {
    if (stats.folders[index].name === "默认收藏") return showToast("默认收藏夹不可删除");
    if (!confirm(`确定删除文件夹 "${stats.folders[index].name}" 吗？单词记录不会丢失。`)) return;

    saveData();

function toggleFavorite(word) {
    // 确保数据初始化
    if (!stats.folders || stats.folders.length === 0) {
        stats.folders = [{ name: "默认收藏", words: [], date: Date.now() }];
    }

    // 记录当前正在管理的单词
    window.currentManagingWord = word;
    document.getElementById('managingWordTitle').innerText = `单词: ${word}`;

    // 渲染复选列表
    renderFolderChecklist(word);

    // 显示浮窗
    document.getElementById('folderManagerModal').style.display = 'flex';
}

function renderFolderChecklist(word) {
    const container = document.getElementById('folderChecklist');
    
    container.innerHTML = stats.folders.map((folder, index) => {
        const isChecked = folder.words.includes(word);
        // 使用拟态化样式的复选条目
        return `
            <div class="neu-pressed" 
                 onclick="toggleWordInFolder(${index}, '${word}')"
                 style="display:flex; justify-content:space-between; align-items:center; padding:12px 15px; border-radius:15px; cursor:pointer; transition: 0.2s;">
                <span style="font-size:13px; font-weight:500;">${folder.name}</span>
                <span style="font-size:18px;">${isChecked ? '✅' : '⬜'}</span>
            </div>
        `;
    }).join('');
}

function toggleWordInFolder(folderIdx, word) {
    const folder = stats.folders[folderIdx];
    const wordIdx = folder.words.indexOf(word);

    if (wordIdx > -1) {
        folder.words.splice(wordIdx, 1); // 移除
    } else {
        folder.words.push(word); // 添加
    }

    saveData();
    updateLists();
    // 重新渲染列表以更新 ✅ 状态
    renderFolderChecklist(word);
}

function closeFolderManager() {
    document.getElementById('folderManagerModal').style.display = 'none';
    // 如果是从详情页打开的，关闭管理窗时刷新详情页显示所属文件夹
    if (document.getElementById('wordDetail').style.display === 'flex') {
        openWordDetail(window.currentManagingWord);
    }
}

function renderFolderChips() {
    const container = document.getElementById('folderChipsContainer');
    if (!stats.folders || stats.folders.length === 0) {
        container.innerHTML = '<span style="font-size:11px;opacity:0.5;">尚无文件夹</span>';
        return;
    }

    container.innerHTML = stats.folders.map((f, index) => {
        const isActive = selectedFolderIndexes.includes(index);
        return `
            <div class="word-item" 
                 style="font-size:11px; ${isActive ? 'color:var(--accent-color); box-shadow:inset 2px 2px 5px var(--shadow-dark);' : ''}" 
                 onclick="toggleFolderSelect(${index})">
                ${isActive ? '✅ ' : ''}${f.name} (${f.words.length})
            </div>
        `;
    }).join('');
}

function toggleFolderSelect(index) {
    const pos = selectedFolderIndexes.indexOf(index);
    if (pos > -1) {
        selectedFolderIndexes.splice(pos, 1);
    } else {
        selectedFolderIndexes.push(index);
    }
    renderFolderChips();
}

let selectedDatesToClear = [];

function openClearDataModal() {
    const dateContainer = document.getElementById('dateChecklist');
    // 逻辑推导：从 stats.history 提取所有有记录的日期
    const dates = Object.keys(stats.history || {}).sort((a, b) => new Date(b) - new Date(a));
    
    if (dates.length === 0) {
        return showToast("暂无可清除的历史记录");
    }

    selectedDatesToClear = [];
    dateContainer.innerHTML = dates.map(date => `
        <div class="neu-pressed" onclick="toggleDateSelection('${date}', this)" 
             style="display:flex; justify-content:space-between; padding:12px; border-radius:12px; cursor:pointer;">
            <span style="font-size:13px;">${date}</span>
            <span class="check-icon">⬜</span>
        </div>
    `).join('');

    document.getElementById('clearDataModal').style.display = 'flex';
}

function toggleDateSelection(date, el) {
    const idx = selectedDatesToClear.indexOf(date);
    const icon = el.querySelector('.check-icon');
    if (idx > -1) {
        selectedDatesToClear.splice(idx, 1);
        icon.innerText = '⬜';
        el.style.color = 'var(--text-color)';
    } else {
        selectedDatesToClear.push(date);
        icon.innerText = '✅';
        el.style.color = 'var(--danger-color)';
    }
}

async function confirmClearData() {
    if (selectedDatesToClear.length === 0) return showToast("未选择任何日期");

    // 第一重警告：基础确认
    const count = selectedDatesToClear.length;
    if (!confirm(`警告：确定要删除这 ${count} 天的所有学习记录吗？\n此操作将移除对应的单词统计和复习进度。`)) return;

    // 第二重警告：逻辑确认（防止手抖）
    const finalCheck = prompt(`请输入 "DELETE" 以确认删除操作：`);
    if (finalCheck !== "DELETE") return showToast("验证失败，操作取消");

    // 执行删除逻辑
    selectedDatesToClear.forEach(date => {
        // 1. 删除历史统计
        delete stats.history[date];
        if (stats.reviewHistoryMap) delete stats.reviewHistoryMap[date];
        
        // 2. 从 all 数组中过滤掉该日期加入的单词（可选，视你对“清除数据”的定义而定）
        // 逻辑：如果只删统计不删单词，则跳过此步；如果要完全抹除该日的学习痕迹，则启用下方：
        stats.all = stats.all.filter(item => item.date !== date);
    });

    // 3. 更新状态
    if (selectedDatesToClear.includes(getTodayStr())) {
        stats.today = [];
    }

    saveData();
    updateLists();
    renderStats();
    closeClearDataModal();
    showToast(`已成功清除 ${count} 天的数据`);
}

function closeClearDataModal() {
    document.getElementById('clearDataModal').style.display = 'none';
}

</script>
