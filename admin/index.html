<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>博客后台管理系统</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "kiooo808/kiooo808.github.io",
            branch: "main",
            // ========== 🌟 核心修复：引入免费的公共 OAuth 认证网关 ==========
            base_url: "https://decap-cms-oauth-pkpx.vercel.app", 
            auth_endpoint: "api/auth"
          },
          site_domain: "kiooo808.github.io",
          media_folder: "source/images",
          public_folder: "/images",
          collections: [
            {
              name: "moments",
              label: "动态板块",
              label_singular: "动态",
              folder: "source/_posts",
              create: true,
              slug: "moment-{{year}}-{{month}}-{{day}}-{{slug}}",
              fields: [
                { label: "标题", name: "title", widget: "string", default: "日常碎碎念" },
                { label: "发布时间", name: "date", widget: "datetime" },
                { label: "布局样式", name: "layout", widget: "hidden", default: "essay" },
                { label: "分类", name: "categories", widget: "hidden", default: "动态" },
                { label: "动态内容", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
