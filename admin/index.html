  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      // 告诉 CMS 主动去抓取同目录下的 config.yaml 配置文件
      // 自定义配置文件的扩展名为 .yaml
      const configUrl = window.location.pathname.endsWith('/') 
        ? 'config.yaml' 
        : 'admin/config.yaml';
        
      // 这里不需要手动显式调用 CMS.init()，它会自动根据相对路径加载文件
    </script>
  </body>
